name: Update README cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=kaanaldemir&hide=objective-c,swift,c,c%2B%2B,cmake,scss,html,ruby,javascript&hide_progress=false&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=kaanaldemir&show_icons=true&hide_rank=true&hide_border=true&theme=tokyonight&show=prs_merged,prs_merged_percentage&line_height=32
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate DLSS override pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=kaanaldemir&repo=DLSS-Override-For-All-Games&theme=tokyonight&hide_border=true
          path: profile/pin-dlss-override-for-all-games.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contrast stretching pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=kaanaldemir&repo=Custom-Contrast-Stretching-GUI&theme=tokyonight&hide_border=true
          path: profile/pin-custom-contrast-stretching-gui.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate auto subtitle pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=kaanaldemir&repo=auto-subtitle-gui&theme=tokyonight&hide_border=true
          path: profile/pin-auto-subtitle-gui.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate personal website pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=kaanaldemir&repo=kaanaldemir.github.io&theme=tokyonight&hide_border=true
          path: profile/pin-kaanaldemir-github-io.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
